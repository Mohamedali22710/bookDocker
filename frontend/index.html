<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبة المهندسة | ArchiMind Lib</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'IBM Plex Sans Arabic', sans-serif; background: #f8fafc; }
        .nav-link { cursor: pointer; transition: all 0.3s; }
        .nav-link:hover { color: #4f46e5; }
        .active-tab { border-bottom: 2px solid #4f46e5; color: #4f46e5; font-weight: bold; }
    </style>
</head>
<body class="min-h-screen">

    <!-- Navigation Bar -->
    <nav class="bg-white shadow-sm p-4 sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <span class="text-xl font-bold text-indigo-600">📚 مكتبتي</span>
            <div class="flex gap-6">
                <span onclick="switchTab('home')" id="tab-home" class="nav-link active-tab">الرئيسية</span>
                <span onclick="switchTab('list')" id="tab-list" class="nav-link">كل الكتب</span>
                <span onclick="switchTab('add')" id="tab-add" class="nav-link">إضافة كتاب</span>
            </div>
        </div>
    </nav>

    <div class="max-w-2xl mx-auto mt-10 px-4">
        
        <!-- 1. صفحة الهوم (ترحيبية) -->
        <div id="section-home" class="text-center py-20 bg-white rounded-3xl shadow-xl border border-white">
            <h1 class="text-4xl font-bold text-slate-800 mb-4 text-indigo-600">أهلاً بكِ يا مهندسة!</h1>
            <p class="text-slate-500 text-lg mb-8 px-6">هذا النظام مخصص لإدارة الكتب والمراجع الخاصة بمشروع التخرج.</p>
            <button onclick="switchTab('list')" class="bg-indigo-600 text-white px-8 py-3 rounded-xl hover:bg-indigo-700 transition-all">
                ابدئي بتصفح الكتب
            </button>
        </div>

        <!-- 2. صفحة عرض الكتب -->
        <div id="section-list" class="hidden">
            <h2 class="text-2xl font-bold mb-6 text-slate-700">قائمة الكتب الحالية</h2>
            <div id="loading" class="hidden text-center py-4 italic text-slate-400">جاري جلب البيانات...</div>
            <div id="booksList" class="space-y-4"></div>
        </div>

        <!-- 3. صفحة إضافة كتاب -->
        <div id="section-add" class="hidden">
            <h2 class="text-2xl font-bold mb-6 text-slate-700 text-center">إضافة مرجع جديد</h2>
            <div class="bg-white p-8 rounded-2xl shadow-lg border border-slate-100">
                <div class="space-y-4 text-right">
                    <div>
                        <label class="block text-sm font-medium text-slate-600 mb-1">اسم الكتاب</label>
                        <input type="text" id="title" class="w-full px-4 py-3 rounded-xl border focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-600 mb-1">اسم المؤلف</label>
                        <input type="text" id="author" class="w-full px-4 py-3 rounded-xl border focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                    <button onclick="addBook()" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold shadow-lg hover:bg-indigo-700 transition-all">
                        تأكيد الإضافة
                    </button>
                </div>
            </div>
        </div>

    </div>

<script>
    const API_URL = 'http://localhost:5000/api/books';

    // وظيفة التنقل بين الصفحات
    function switchTab(tabName) {
        // إخفاء كل السيكشنز
        document.getElementById('section-home').classList.add('hidden');
        document.getElementById('section-list').classList.add('hidden');
        document.getElementById('section-add').classList.add('hidden');
        
        // إزالة الـ Active من اللينكات
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active-tab'));

        // إظهار السيكشن المختار وتفعيل اللينك بتاعه
        document.getElementById(`section-${tabName}`).classList.remove('hidden');
        document.getElementById(`tab-${tabName}`).classList.add('active-tab');

        // لو الصفحة هي "كل الكتب" جيب الداتا
        if(tabName === 'list') showBooks();
    }

    async function showBooks() {
        const list = document.getElementById('booksList');
        const loader = document.getElementById('loading');
        loader.classList.remove('hidden');
        list.innerHTML = '';

        try {
            const res = await fetch(API_URL);
            const books = await res.json();
            if (books.length === 0) {
                list.innerHTML = `<div class="text-center py-10 text-slate-400">لا توجد كتب مضافة بعد.</div>`;
            } else {
                list.innerHTML = books.map(book => `
                    <div class="bg-white p-5 rounded-2xl shadow-sm border-r-4 border-indigo-500 flex justify-between items-center">
                        <div>
                            <h3 class="font-bold text-slate-800">${book.title}</h3>
                            <p class="text-slate-500 text-sm">${book.author}</p>
                        </div>
                        <button onclick="deleteBook('${book._id}')" class="text-red-400 hover:text-red-600 text-sm">حذف</button>
                    </div>
                `).join('');
            }
        } catch (err) { list.innerHTML = `<div class="text-red-500 text-center">خطأ في الاتصال بالسيرفر!</div>`; }
        finally { loader.classList.add('hidden'); }
    }

    async function addBook() {
        const title = document.getElementById('title').value;
        const author = document.getElementById('author').value;

        if(!title || !author) { alert('برجاء ملء جميع الحقول'); return; }

        await fetch(API_URL, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ title, author })
        });
        
        document.getElementById('title').value = '';
        document.getElementById('author').value = '';
        switchTab('list'); // بعد الإضافة روح لصفحة الكتب
    }

    async function deleteBook(id) {
        if(!confirm('حذف الكتاب؟')) return;
        await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
        showBooks();
    }
</script>
</body>
</html>
